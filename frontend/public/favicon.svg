<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded tile in UofT blue. WHY a filled tile rather than a bare cap:
       browser tabs render on both light and dark chrome; a white-on-transparent
       cap would vanish on a white tab, so we anchor the glyph on its own
       brand-blue background that stays legible everywhere. -->
  <rect width="64" height="64" rx="14" fill="#002A5C"/>
  <!-- Mortarboard top (the diamond board), drawn slightly wider than tall so it
       reads as a board viewed in perspective rather than a square. -->
  <path d="M32 15 L55 25.5 L32 36 L9 25.5 Z" fill="#ffffff"/>
  <!-- Subtle inner seam on the board for a hint of dimensionality. -->
  <path d="M32 15 L55 25.5 L32 36 L9 25.5 Z" fill="none" stroke="#002A5C" stroke-width="0.6" opacity="0.25"/>
  <!-- The cap's "bell" / head band beneath the board. Drawn at 90% opacity so it
       recedes behind the crisp white board above it. -->
  <path d="M19 30.5 L19 40 C19 44.2 25 47.5 32 47.5 C39 47.5 45 44.2 45 40 L45 30.5 L32 36.7 Z" fill="#ffffff" opacity="0.9"/>
  <!-- Accent-blue tassel cord hanging from the right of the board, in the
       light blue accent (#4BA3F5) so the favicon carries the same accent the UI uses. -->
  <path d="M55 25.5 L55 41" stroke="#4BA3F5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <circle cx="55" cy="43.4" r="2.8" fill="#4BA3F5"/>
</svg>
